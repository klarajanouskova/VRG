<button id="vrg-theme-toggle" type="button" aria-label="Toggle night mode" title="Toggle night mode">
  <svg class="vrg-theme-icon vrg-theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>
  </svg>
  <svg class="vrg-theme-icon vrg-theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M12 4.5a1 1 0 0 1-1-1V2a1 1 0 1 1 2 0v1.5a1 1 0 0 1-1 1Zm0 17a1 1 0 0 1-1-1V19a1 1 0 1 1 2 0v1.5a1 1 0 0 1-1 1Zm8.5-9.5H19a1 1 0 1 1 0-2h1.5a1 1 0 1 1 0 2ZM5 12H3.5a1 1 0 1 1 0-2H5a1 1 0 1 1 0 2Zm12.8-6.3a1 1 0 0 1-.7-1.7l1.1-1.1a1 1 0 1 1 1.4 1.4l-1.1 1.1a1 1 0 0 1-.7.3ZM5.4 19.6a1 1 0 0 1-.7-1.7l1.1-1.1a1 1 0 1 1 1.4 1.4l-1.1 1.1a1 1 0 0 1-.7.3Zm13.2 0a1 1 0 0 1-.7-.3l-1.1-1.1a1 1 0 1 1 1.4-1.4l1.1 1.1a1 1 0 0 1-.7 1.7ZM6.5 6.8a1 1 0 0 1-.7-.3L4.7 5.4A1 1 0 1 1 6.1 4l1.1 1.1a1 1 0 0 1-.7 1.7ZM12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10Z"/>
  </svg>
</button>
<script>
(function () {
  var btn = document.getElementById('vrg-theme-toggle');
  var darkLink = document.getElementById('vrg-dark-stylesheet');
  if (!btn || !darkLink) return;

  btn.addEventListener('click', function () {
    var nowDark = !darkLink.disabled;
    var nextDark = !nowDark;
    darkLink.disabled = !nextDark;
    document.documentElement.setAttribute('data-vrg-theme', nextDark ? 'dark' : 'light');
    try { localStorage.setItem('vrg-theme', nextDark ? 'vrg-dark' : 'vrg'); } catch (e) {}
    btn.setAttribute('aria-label', nextDark ? 'Switch to day mode' : 'Switch to night mode');
  });
})();
</script>
